<!DOCTYPE html>
<html>
<head>
    <title>Custom Haiku NFT - Larger Sizes</title>
    <style>
        body {
            margin: 0;
            padding: 30px;
            background: #0a0a0a;
            font-family: 'Georgia', serif;
            color: #fff;
        }
        h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 10px;
            color: #cf6;
        }
        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 40px;
            font-size: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1800px;
            margin: 0 auto;
        }
        .nft-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.3s;
        }
        .nft-card:hover {
            border-color: #cf6;
        }
        .nft-preview {
            width: 100%;
            aspect-ratio: 1;
            background: white;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .nft-info {
            font-family: monospace;
            font-size: 12px;
            color: #aaa;
        }
        .nft-info h3 {
            color: #cf6;
            font-size: 14px;
            margin: 0 0 10px 0;
            font-family: 'Georgia', serif;
        }
        .stat {
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-label {
            color: #666;
        }
        .stat-value {
            color: #cf6;
            font-weight: bold;
        }
        svg {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <h1>Custom Haiku NFT - Larger Sizes</h1>
    <div class="subtitle">Updated: <40=30px, <50=25px, <60=16px, >60=14px</div>
    
    <div class="grid" id="nftGrid"></div>

    <script>
        // Test different line 2 lengths
        const testHaikus = [
            {
                text: "Moon / Rises / Night",
                name: "Very Short (6 chars → 30px)"
            },
            {
                text: "Winter moon rises / Bare branches scratch sky / Frost claims everything",
                name: "Short (25 chars → 30px)"
            },
            {
                text: "Morning dew gathers / On spider silk stretched between / Brief beauty",
                name: "Medium (38 chars → 30px)"
            },
            {
                text: "Winter moon rises / Bare branches scratch at the sky / Frost claims everything",
                name: "Medium-Long (45 chars → 25px)"
            },
            {
                text: "In the quiet morning / When all the world is still and silent / I wake with empty memory",
                name: "Long (48 chars → 25px)"
            },
            {
                text: "Morning dew gathers / On spider silk stretched between worlds unknown / Brief beauty",
                name: "Very Long (56 chars → 16px)"
            },
            {
                text: "Blockchain holds words / The permanent record of everything I've written / Forever",
                name: "Max (59 chars → 16px)"
            },
            {
                text: "System event fires / Cron job executes shell script subprocess background process / Memory fades",
                name: "Over Limit (65 chars → 14px)"
            }
        ];
        
        // Solid background colors
        const backgrounds = [
            { color: "#ffffff", name: "Pure White" },
            { color: "#f8f8f8", name: "Off White" },
            { color: "#fffef5", name: "Cream" },
            { color: "#fffaed", name: "Pale Yellow" }
        ];

        function calculateFontSize(haiku) {
            const lines = haiku.split(' / ');
            if (lines.length < 2) return 25; // Fallback
            
            const line2Length = lines[1].length;
            
            // Updated size thresholds
            if (line2Length < 40) return 30;   // Large for short lines
            if (line2Length < 50) return 25;   // Medium for comfortable lines
            if (line2Length <= 60) return 16;  // Smaller for target max
            return 14;                          // Safety net for overflow
        }

        function generateSVG(bgColor, haiku) {
            const fontSize = calculateFontSize(haiku);
            
            // Split haiku into lines
            const lines = haiku.split(' / ');
            const tspans = lines.map((line, i) => 
                `<tspan x="250" dy="${i === 0 ? '0' : '1.5em'}">${line}</tspan>`
            ).join('');
            
            return `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
                    <rect width="500" height="500" fill="${bgColor}"/>
                    <text x="250" y="220" font-family="Georgia, serif" font-size="${fontSize}" 
                          fill="#2a2a2a" text-anchor="middle" font-style="italic">
                        ${tspans}
                    </text>
                </svg>
            `;
        }

        function renderNFTs() {
            const grid = document.getElementById('nftGrid');
            
            // Show each haiku with a couple backgrounds
            testHaikus.forEach(haiku => {
                backgrounds.slice(0, 2).forEach(bg => {
                    const svg = generateSVG(bg.color, haiku.text);
                    const fontSize = calculateFontSize(haiku.text);
                    const lines = haiku.text.split(' / ');
                    const line2Length = lines.length >= 2 ? lines[1].length : 0;
                    
                    const card = document.createElement('div');
                    card.className = 'nft-card';
                    card.innerHTML = `
                        <div class="nft-preview">${svg}</div>
                        <div class="nft-info">
                            <h3>${haiku.name}</h3>
                            <div class="stat">
                                <span class="stat-label">Line 2 Length:</span>
                                <span class="stat-value">${line2Length} chars</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">Font Size:</span>
                                <span class="stat-value">${fontSize}px</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">Background:</span>
                                <span class="stat-value">${bg.name}</span>
                            </div>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
            });
        }

        renderNFTs();
    </script>
</body>
</html>
