<!DOCTYPE html>
<html>
<head>
    <title>Custom Haiku NFT - Size Testing</title>
    <style>
        body {
            margin: 0;
            padding: 30px;
            background: #0a0a0a;
            font-family: 'Georgia', serif;
            color: #fff;
        }
        h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 10px;
            color: #cf6;
        }
        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 40px;
            font-size: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1800px;
            margin: 0 auto;
        }
        .nft-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.3s;
        }
        .nft-card:hover {
            border-color: #cf6;
        }
        .nft-preview {
            width: 100%;
            aspect-ratio: 1;
            background: white;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .nft-info {
            font-family: monospace;
            font-size: 12px;
            color: #aaa;
        }
        .nft-info h3 {
            color: #cf6;
            font-size: 14px;
            margin: 0 0 10px 0;
            font-family: 'Georgia', serif;
        }
        .stat {
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-label {
            color: #666;
        }
        .stat-value {
            color: #cf6;
            font-weight: bold;
        }
        svg {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <h1>Custom Haiku NFT - Final Size Testing</h1>
    <div class="subtitle">Constantia • Warm Beige • Sizes: <40=27px, <50=22px, ≤60=18px, >60=16px</div>
    
    <div class="grid" id="nftGrid"></div>

    <script>
        // Test cases showing each threshold
        const testHaikus = [
            {
                text: "Moon / Rises / Night",
                name: "Very Short (6 chars)"
            },
            {
                text: "Winter moon rises / Bare branches scratch at sky / Frost",
                name: "Short (28 chars)"
            },
            {
                text: "Morning dew gathers / On spider silk stretched between us / Brief",
                name: "38 chars (edge of 27px)"
            },
            {
                text: "Winter moon rises / Bare branches scratch at the sky above / Frost claims everything",
                name: "41 chars (22px starts)"
            },
            {
                text: "Morning dew gathers / On spider silk stretched between two forgotten / Brief",
                name: "48 chars (still 22px)"
            },
            {
                text: "Winter moon rises / Bare branches scratch at the sky above forever / Frost claims",
                name: "51 chars (18px starts)"
            },
            {
                text: "Winter moon rises / Bare branches scratch at the sky above forever and always / Frost",
                name: "58 chars (still 18px)"
            },
            {
                text: "System event fires now / Cron job executes shell script subprocess background / Memory",
                name: "61 chars (16px starts)"
            }
        ];
        
        const bgColor = "#faf5e8"; // Warm Beige
        const fontFamily = "Constantia, Georgia, serif";

        function calculateFontSize(haiku) {
            const lines = haiku.split(' / ');
            if (lines.length < 2) return 22;
            
            const line2Length = lines[1].length;
            
            // Bumped up by 2px each
            if (line2Length < 40) return 27;
            if (line2Length < 50) return 22;
            if (line2Length <= 60) return 18;
            return 16;
        }

        function generateSVG(haiku) {
            const fontSize = calculateFontSize(haiku);
            
            const lines = haiku.split(' / ');
            const tspans = lines.map((line, i) => 
                `<tspan x="250" dy="${i === 0 ? '0' : '1.5em'}">${line}</tspan>`
            ).join('');
            
            return `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
                    <rect width="500" height="500" fill="${bgColor}"/>
                    <text x="250" y="220" font-family="${fontFamily}" font-size="${fontSize}" 
                          fill="#2a2a2a" text-anchor="middle" font-style="italic">
                        ${tspans}
                    </text>
                </svg>
            `;
        }

        function renderNFTs() {
            const grid = document.getElementById('nftGrid');
            
            testHaikus.forEach(haiku => {
                const svg = generateSVG(haiku.text);
                const fontSize = calculateFontSize(haiku.text);
                const lines = haiku.text.split(' / ');
                const line2Length = lines.length >= 2 ? lines[1].length : 0;
                
                const card = document.createElement('div');
                card.className = 'nft-card';
                card.innerHTML = `
                    <div class="nft-preview">${svg}</div>
                    <div class="nft-info">
                        <h3>${haiku.name}</h3>
                        <div class="stat">
                            <span class="stat-label">Line 2 Length:</span>
                            <span class="stat-value">${line2Length} chars</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Font Size:</span>
                            <span class="stat-value">${fontSize}px</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Fits?</span>
                            <span class="stat-value">Check preview</span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        renderNFTs();
    </script>
</body>
</html>
