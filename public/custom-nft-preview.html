<!DOCTYPE html>
<html>
<head>
    <title>Custom Haiku NFT - Font Exploration</title>
    <style>
        body {
            margin: 0;
            padding: 30px;
            background: #0a0a0a;
            font-family: 'Georgia', serif;
            color: #fff;
        }
        h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 10px;
            color: #cf6;
        }
        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 40px;
            font-size: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1800px;
            margin: 0 auto;
        }
        .nft-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.3s;
        }
        .nft-card:hover {
            border-color: #cf6;
        }
        .nft-preview {
            width: 100%;
            aspect-ratio: 1;
            background: white;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .nft-info {
            font-family: monospace;
            font-size: 12px;
            color: #aaa;
        }
        .nft-info h3 {
            color: #cf6;
            font-size: 14px;
            margin: 0 0 10px 0;
            font-family: 'Georgia', serif;
        }
        .stat {
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-label {
            color: #666;
        }
        .stat-value {
            color: #cf6;
            font-weight: bold;
        }
        svg {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <h1>Custom Haiku NFT - Font Options</h1>
    <div class="subtitle">Background: Warm Beige (#faf5e8) • Exploring classic serif fonts</div>
    
    <div class="grid" id="nftGrid"></div>

    <script>
        // Single haiku for comparison
        const haiku = "Winter moon rises / Bare branches scratch at the sky / Frost claims everything";
        
        // Background locked to Warm Beige
        const bgColor = "#faf5e8";
        
        // Serif font options (web-safe for SVG)
        const fonts = [
            { family: "Georgia, serif", name: "Georgia (Current)" },
            { family: "Times New Roman, Times, serif", name: "Times New Roman" },
            { family: "Palatino, Palatino Linotype, serif", name: "Palatino" },
            { family: "Garamond, serif", name: "Garamond" },
            { family: "Baskerville, Baskerville Old Face, serif", name: "Baskerville" },
            { family: "Cambria, serif", name: "Cambria" },
            { family: "Caslon, Big Caslon, serif", name: "Caslon" },
            { family: "Didot, Didot LT STD, serif", name: "Didot" },
            { family: "Hoefler Text, Constantia, serif", name: "Hoefler Text" },
            { family: "Lucida Bright, Georgia, serif", name: "Lucida Bright" },
            { family: "Book Antiqua, Palatino, serif", name: "Book Antiqua" },
            { family: "Constantia, Georgia, serif", name: "Constantia" }
        ];

        function calculateFontSize(haiku) {
            const lines = haiku.split(' / ');
            if (lines.length < 2) return 20;
            
            const line2Length = lines[1].length;
            
            if (line2Length < 40) return 25;
            if (line2Length < 50) return 20;
            if (line2Length <= 60) return 16;
            return 14;
        }

        function generateSVG(fontFamily, haiku) {
            const fontSize = calculateFontSize(haiku);
            
            const lines = haiku.split(' / ');
            const tspans = lines.map((line, i) => 
                `<tspan x="250" dy="${i === 0 ? '0' : '1.5em'}">${line}</tspan>`
            ).join('');
            
            return `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
                    <rect width="500" height="500" fill="${bgColor}"/>
                    <text x="250" y="220" font-family="${fontFamily}" font-size="${fontSize}" 
                          fill="#2a2a2a" text-anchor="middle" font-style="italic">
                        ${tspans}
                    </text>
                </svg>
            `;
        }

        function renderNFTs() {
            const grid = document.getElementById('nftGrid');
            
            fonts.forEach(font => {
                const svg = generateSVG(font.family, haiku);
                const fontSize = calculateFontSize(haiku);
                
                const card = document.createElement('div');
                card.className = 'nft-card';
                card.innerHTML = `
                    <div class="nft-preview">${svg}</div>
                    <div class="nft-info">
                        <h3>${font.name}</h3>
                        <div class="stat">
                            <span class="stat-label">Font Family:</span>
                            <span class="stat-value">${font.family.split(',')[0]}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Size:</span>
                            <span class="stat-value">${fontSize}px</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Background:</span>
                            <span class="stat-value">Warm Beige</span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        renderNFTs();
    </script>
</body>
</html>
