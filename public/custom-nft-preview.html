<!DOCTYPE html>
<html>
<head>
    <title>Custom Haiku NFT - Design Preview</title>
    <style>
        body {
            margin: 0;
            padding: 30px;
            background: #0a0a0a;
            font-family: 'Georgia', serif;
            color: #fff;
        }
        h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 10px;
            color: #cf6;
        }
        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 40px;
            font-size: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1800px;
            margin: 0 auto;
        }
        .nft-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.3s;
        }
        .nft-card:hover {
            border-color: #cf6;
        }
        .nft-preview {
            width: 100%;
            aspect-ratio: 1;
            background: white;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .nft-info {
            font-family: monospace;
            font-size: 12px;
            color: #aaa;
        }
        .nft-info h3 {
            color: #cf6;
            font-size: 14px;
            margin: 0 0 10px 0;
            font-family: 'Georgia', serif;
        }
        .stat {
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-label {
            color: #666;
        }
        .stat-value {
            color: #cf6;
            font-weight: bold;
        }
        svg {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <h1>Custom Haiku NFT - Color Exploration</h1>
    <div class="subtitle">Font sizes: <40=25px, <50=20px, ≤60=16px, >60=14px • Whites to Greys to Yellows</div>
    
    <div class="grid" id="nftGrid"></div>

    <script>
        // Single medium-length haiku to showcase colors
        const haiku = "Winter moon rises / Bare branches scratch at the sky / Frost claims everything";
        
        // Expanded color palette: whites → greys → yellows
        const backgrounds = [
            // Pure Whites
            { color: "#ffffff", name: "Pure White" },
            { color: "#fefefe", name: "Snow" },
            { color: "#fafafa", name: "Ghost White" },
            
            // Off-Whites
            { color: "#f8f8f8", name: "Off White" },
            { color: "#f5f5f5", name: "Smoke" },
            { color: "#f2f2f2", name: "Alabaster" },
            
            // Light Greys
            { color: "#f0f0f0", name: "Light Grey" },
            { color: "#eeeeee", name: "Platinum" },
            { color: "#e8e8e8", name: "Silver" },
            { color: "#e0e0e0", name: "Gainsboro" },
            
            // Medium Greys
            { color: "#d8d8d8", name: "Medium Grey" },
            { color: "#d0d0d0", name: "Concrete" },
            { color: "#c8c8c8", name: "Ash" },
            { color: "#c0c0c0", name: "Stone" },
            
            // Warm Whites/Creams
            { color: "#fffef5", name: "Cream" },
            { color: "#fffdf7", name: "Ivory" },
            { color: "#fffcf0", name: "Linen" },
            { color: "#fffaeb", name: "Vanilla" },
            
            // Pale Yellows
            { color: "#fffaed", name: "Pale Yellow" },
            { color: "#fff9e6", name: "Champagne" },
            { color: "#fff8e1", name: "Light Cream" },
            { color: "#fff7dc", name: "Cornsilk" },
            
            // Light Beiges
            { color: "#faf5e8", name: "Warm Beige" },
            { color: "#f8f4e6", name: "Eggshell" },
            { color: "#f5f0e6", name: "Light Tan" },
            { color: "#f2ede3", name: "Sand" },
            
            // Deeper Yellows/Tans
            { color: "#eee8dc", name: "Parchment" },
            { color: "#ebe5d8", name: "Wheat" },
            { color: "#e8e2d5", name: "Latte" },
            { color: "#e5dfd2", name: "Biscuit" }
        ];

        function calculateFontSize(haiku) {
            const lines = haiku.split(' / ');
            if (lines.length < 2) return 20;
            
            const line2Length = lines[1].length;
            
            if (line2Length < 40) return 25;
            if (line2Length < 50) return 20;
            if (line2Length <= 60) return 16;
            return 14;
        }

        function generateSVG(bgColor, haiku) {
            const fontSize = calculateFontSize(haiku);
            
            const lines = haiku.split(' / ');
            const tspans = lines.map((line, i) => 
                `<tspan x="250" dy="${i === 0 ? '0' : '1.5em'}">${line}</tspan>`
            ).join('');
            
            return `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
                    <rect width="500" height="500" fill="${bgColor}"/>
                    <text x="250" y="220" font-family="Georgia, serif" font-size="${fontSize}" 
                          fill="#2a2a2a" text-anchor="middle" font-style="italic">
                        ${tspans}
                    </text>
                </svg>
            `;
        }

        function renderNFTs() {
            const grid = document.getElementById('nftGrid');
            
            backgrounds.forEach(bg => {
                const svg = generateSVG(bg.color, haiku);
                const fontSize = calculateFontSize(haiku);
                const lines = haiku.split(' / ');
                const line2Length = lines.length >= 2 ? lines[1].length : 0;
                
                const card = document.createElement('div');
                card.className = 'nft-card';
                card.innerHTML = `
                    <div class="nft-preview">${svg}</div>
                    <div class="nft-info">
                        <h3>${bg.name}</h3>
                        <div class="stat">
                            <span class="stat-label">Color:</span>
                            <span class="stat-value">${bg.color}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Font:</span>
                            <span class="stat-value">${fontSize}px</span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        renderNFTs();
    </script>
</body>
</html>
